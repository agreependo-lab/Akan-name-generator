<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Akan Name Generator</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1> Akan Name Generator</h1>
        <p class="description">Discover your Akan name based on the week you were born. Akan names are  used in Ghanian culture.</p>

        <form id="akanform">
            <div class="form-group">
                <label for="day">Day Of Birth</label>
                <input type="number" id="day" min="1" max="31" placeholder="Enter day (1-31)" required>
                <div class="error" id="dayError"></div>
            </div>

            <div class="form-group">
                <label for="month">Month Of Birth</label>
                <input type="number" id="month" min="1" max="12" placeholder="Enter month (1-12)" required>
                <div class="error" id="monthError"></div>
            </div>

            <div class="form-group">
                <label for="year">Year Birth</label>
                <input type="number" id="year" min="1" max="12" placeholder="Enter year (eg.2000)" required>
                <div class="error" id="yearError"></div>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="gender-group">
                    <div class="radio-option">
                        <input type="radio" id="name" id="female" name="gender" value="female" required>
                        <label  for="female">Female</label>
                    </div>
                    <div class="gender-group">
                        <input type="radio" id="name" id="male" name="gender" value="male" required>
                        <label  for="male">Male</label>
                </div>
            </div>
            <div class="error" id="gender-error"></div>
            </div>

            <button type="submit">Generate My Akan name </button>
        </form>

        <div class="result" id="result">
            <p class="result-text">Your Akan Name is:</p>
            <p class="akan-name" id="akanName"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
